set -g allow-passthrough on
set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM
set -g history-limit 999999999
set -s copy-command 'wl-copy'
set -g default-shell /run/current-system/profile/bin/nu
set -g focus-events on

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'

set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi V send -X select-line
bind-key -T copy-mode-vi y send -X copy-pipe-and-cancel 'wl-copy'

new-session -s "main" -n "FM" -c "$HOME" "nu -e yazi"
new-window -n "notes" -c "~/Documents/notes" "nu -e \"hx notes.md\""
new-window -n "work" -c "$HOME" "nu -e \"ssh work\""
new-window -n "scratch" -c "$HOME"

run '~/.tmux/plugins/tpm/tpm'
